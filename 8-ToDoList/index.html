<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let header = document.createElement('h1');
        header.textContent = 'To Do List';
        document.body.appendChild(header);

        let toDoList = document.createElement('form');
        toDoList.innerHTML = `
            <input type="text" id="taskInput" placeholder="Enter a task">

            <button type="submit">Add Task</button>
        `;
        document.body.appendChild(toDoList);

        let btnSubmit = toDoList.querySelector('button[type="submit"]');
        btnSubmit.addEventListener('click', function() {
            console.log('Submit di klik');
        });

        toDoList.addEventListener('submit', function(event) {
            event.preventDefault();

            let taskText = taskInput.value.trim();
            if (taskText === '') {
                alert('Tugas tidak boleh kosong!');
                return;
            }

            let taskItem = document.createElement('div');
            taskItem.classList.add("d-flex","flex-row" , "align-items-center", "mb-2");

            taskItem.innerHTML = `
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="checkbox">
                    <label class="form-check-label" for="checkbox">${taskText}</label>
                    <button class="btn btn-danger btn-sm ml-2" id="delete">Delete</button>
                </div>
            `;
            document.body.appendChild(taskItem);

            taskInput.value = '';

            let deleteBtn = taskItem.querySelector('#delete');
            deleteBtn.addEventListener('click', function() {
                taskItem.remove();
            });

            let checkbox = taskItem.querySelector('input[type="checkbox"]');
            checkbox.addEventListener('change', function() {
                if (checkbox.checked) {
                    taskItem.style.background = 'green';
                } else {
                    taskItem.style.background = 'white';
                }

            });
        });
    </script>
</body>
</html>
